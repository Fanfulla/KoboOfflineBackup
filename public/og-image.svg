<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F1E8"/>

  <!-- Subtle texture border -->
  <rect x="0" y="0" width="1200" height="8" fill="#D4A574"/>
  <rect x="0" y="622" width="1200" height="8" fill="#D4A574"/>

  <!-- KoBup badge top-left -->
  <rect x="72" y="60" width="130" height="46" rx="10" fill="#2C2416"/>
  <text x="137" y="91" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#D4A574" text-anchor="middle">KoBup</text>

  <!-- kobup.org label top-right -->
  <text x="1128" y="91" font-family="Arial, sans-serif" font-size="22" fill="#9A8670" text-anchor="end">kobup.org</text>

  <!-- Main headline -->
  <text x="600" y="230" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#2C2416" text-anchor="middle">Never Lose Your</text>
  <text x="600" y="335" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#D4A574" text-anchor="middle">Kobo Library</text>
  <text x="600" y="440" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#2C2416" text-anchor="middle">Again</text>

  <!-- Tagline -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="30" fill="#6B5B3E" text-anchor="middle">Free Kobo backup tool · 100% private · runs in your browser</text>

  <!-- Bottom pills -->
  <rect x="293" y="556" width="200" height="36" rx="18" fill="#2C2416" opacity="0.08"/>
  <text x="393" y="580" font-family="Arial, sans-serif" font-size="18" fill="#2C2416" text-anchor="middle">No account needed</text>

  <rect x="503" y="556" width="194" height="36" rx="18" fill="#2C2416" opacity="0.08"/>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="18" fill="#2C2416" text-anchor="middle">No uploads ever</text>

  <rect x="707" y="556" width="200" height="36" rx="18" fill="#2C2416" opacity="0.08"/>
  <text x="807" y="580" font-family="Arial, sans-serif" font-size="18" fill="#2C2416" text-anchor="middle">Free &amp; open source</text>
</svg>
